<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Player</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --bg: #000;
            --control-bg: rgba(0, 0, 0, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }

        .player-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #000;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .brand .lightning { color: #fbbf24; }

        /* Bottom Controls */
        .bottom-controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            padding: 20px 15px 15px;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .progress-container {
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-filled {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .play-pause-btn {
            width: 52px;
            height: 52px;
            background: rgba(255,255,255,0.2);
        }

        .time {
            font-size: 0.9rem;
            min-width: 90px;
            text-align: center;
        }

        /* Center Play Button */
        .center-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            background: rgba(0,0,0,0.7);
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 50;
            opacity: 0;
            transition: all 0.3s;
        }

        .center-play.show {
            opacity: 1;
        }

        .center-play svg {
            width: 40px;
            height: 40px;
            margin-left: 6px;
        }

        /* Fullscreen Button - Made Prominent */
        #fullscreenBtn {
            background: rgba(255,255,255,0.25) !important;
            font-size: 1.4rem;
        }

        /* Loading */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 60;
        }

        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Hide cursor when inactive */
        .inactive .bottom-controls,
        .inactive .top-bar {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="player-container" id="container">
        <video id="video" preload="metadata"></video>

        <!-- Center Play Button -->
        <div class="center-play" id="centerPlay">
            <svg viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21"/></svg>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading"></div>

        <!-- Top Bar -->
        <div class="top-bar" id="topBar">
            <div class="brand">
                <span class="lightning">⚡</span>
                <span>Fast Player</span>
                <span style="background:#22c55e; color:black; font-size:0.7rem; padding:2px 8px; border-radius:9999px; font-weight:700;">OPTIMIZED</span>
            </div>
            <select id="quality" style="background:rgba(255,255,255,0.1); border:none; color:white; padding:8px 12px; border-radius:8px;">
                <option value="auto">Auto Quality</option>
            </select>
        </div>

        <!-- Bottom Controls -->
        <div class="bottom-controls" id="bottomControls">
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-filled" id="progressFilled"></div>
                </div>
            </div>

            <div class="controls-row">
                <button class="btn play-pause-btn" id="playPauseBtn">
                    <svg id="playIcon" viewBox="0 0 24 24" fill="white" width="28" height="28"><polygon points="5 3 19 12 5 21"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" fill="white" width="28" height="28" style="display:none;"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>

                <div class="time" id="timeDisplay">0:00 / 0:00</div>

                <!-- Spacer -->
                <div style="flex: 1;"></div>

                <button class="btn" id="speedBtn">1x</button>
                <button class="btn" id="pipBtn">📺</button>
                <button class="btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');

        if (videoUrl) {
            video.src = videoUrl;
        }

        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const centerPlay = document.getElementById('centerPlay');
        const progressBar = document.getElementById('progressBar');
        const progressFilled = document.getElementById('progressFilled');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const container = document.getElementById('container');

        let isPlaying = false;

        function togglePlayPause() {
            if (video.paused) {
                video.play();
                isPlaying = true;
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                centerPlay.classList.remove('show');
            } else {
                video.pause();
                isPlaying = false;
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                centerPlay.classList.add('show');
            }
        }

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        });

        // Progress
        video.addEventListener('timeupdate', () => {
            if (video.duration) {
                const percent = (video.currentTime / video.duration) * 100;
                progressFilled.style.width = percent + '%';
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        });

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        });

        // Center play button
        centerPlay.addEventListener('click', togglePlayPause);
        playPauseBtn.addEventListener('click', togglePlayPause);

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Auto hide controls when playing
        let hideTimeout;
        function hideControls() {
            if (isPlaying) {
                document.getElementById('topBar').style.opacity = '0';
                document.getElementById('bottomControls').style.opacity = '0';
            }
        }

        function showControls() {
            document.getElementById('topBar').style.opacity = '1';
            document.getElementById('bottomControls').style.opacity = '1';
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(hideControls, 3000);
        }

        container.addEventListener('mousemove', showControls);
        container.addEventListener('touchstart', showControls);

        // Keyboard support
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlayPause();
            }
            if (e.code === 'KeyF') {
                e.preventDefault();
                fullscreenBtn.click();
            }
        });

        video.addEventListener('click', togglePlayPause);

        // Load video
        video.load();
        centerPlay.classList.add('show');
    </script>
</body>
</html>

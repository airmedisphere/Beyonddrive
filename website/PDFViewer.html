<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f1f5f9;
}

/* 🔥 COMPACT HEADER */
.header {
  position: sticky;
  top: 0;
  background: white;
  padding: 6px 8px;
  display: flex;
  gap: 6px;
  align-items: center;
  border-bottom: 1px solid #ddd;
  z-index: 1000;
  flex-wrap: wrap;
}

button {
  padding: 4px 8px;
  font-size: 12px;
  border: 1px solid #ddd;
  background: white;
  border-radius: 6px;
  cursor: pointer;
}

/* 🔥 SMALL INPUT */
#page-input {
  width: 50px;
  padding: 2px;
  font-size: 12px;
}

/* 🔥 VIEWER USES FULL SPACE */
#pdf-viewer {
  height: calc(100vh - 45px);
  overflow: auto;
  scroll-behavior: smooth;
}

/* FULLSCREEN MODE */
body.fullscreen .header {
  display: none;
}

body.fullscreen #pdf-viewer {
  height: 100vh;
}

/* PAGE STYLE */
.page {
  margin: 10px auto;
  background: white;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  border-radius: 8px;
}

canvas {
  display: block;
}

.loading {
  text-align: center;
  padding: 40px;
}

/* EXIT BUTTON */
#exit-fullscreen {
  position: fixed;
  top: 15px;
  right: 15px;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 8px 12px;
  border-radius: 6px;
  display: none;
  z-index: 2000;
  cursor: pointer;
  font-size: 13px;
  transition: opacity 0.3s;
}

#exit-fullscreen.hidden {
  opacity: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="header">
  <button id="prev">⬅</button>
  <input id="page-input" type="number" value="1">
  <span id="total">/ 0</span>
  <button id="next">➡</button>

  <button id="zoom-in">+</button>
  <button id="zoom-out">-</button>
  <button id="fit">Fit</button>

  <button id="download">⬇</button>
  <button id="fullscreen">⛶</button>
</div>

<div id="pdf-viewer">
  <div class="loading" id="loading">Loading PDF...</div>
</div>

<div id="exit-fullscreen">Exit</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const urlParams = new URLSearchParams(window.location.search);
const path = urlParams.get('path');
const fileURL = `/file?path=${encodeURIComponent(path)}`;

let pdfDoc = null;
let totalPages = 0;
let currentPage = 1;
let scale = 1.2;

const viewer = document.getElementById('pdf-viewer');
const loading = document.getElementById('loading');

const pageRefs = {};
const canvasRefs = {};
const rendered = new Set();

async function init() {
  pdfDoc = await pdfjsLib.getDocument(fileURL).promise;
  totalPages = pdfDoc.numPages;

  document.getElementById('total').textContent = `/ ${totalPages}`;

  const page = await pdfDoc.getPage(1);
  const vp = page.getViewport({ scale: 1 });
  scale = (viewer.clientWidth - 20) / vp.width;

  loading.style.display = 'none';

  createPages();
  observePages();
  trackScroll();
}

function createPages() {
  const wrapper = document.createElement('div');

  for (let i = 1; i <= totalPages; i++) {
    const div = document.createElement('div');
    div.className = 'page';
    div.dataset.page = i;

    const canvas = document.createElement('canvas');

    div.appendChild(canvas);
    wrapper.appendChild(div);

    pageRefs[i] = div;
    canvasRefs[i] = canvas;
  }

  viewer.appendChild(wrapper);
}

function observePages() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const p = parseInt(entry.target.dataset.page);
        renderPage(p);
        if (p > 1) renderPage(p - 1);
        if (p < totalPages) renderPage(p + 1);
      }
    });
  }, { root: viewer, rootMargin: '200px' });

  Object.values(pageRefs).forEach(el => observer.observe(el));
}

async function renderPage(p) {
  if (rendered.has(p)) return;

  const page = await pdfDoc.getPage(p);

  const viewport = page.getViewport({
    scale: scale,
    rotation: (page.rotate + 360) % 360
  });

  const canvas = canvasRefs[p];
  const ctx = canvas.getContext('2d');

  const dpr = window.devicePixelRatio || 1;

  canvas.width = viewport.width * dpr;
  canvas.height = viewport.height * dpr;
  canvas.style.width = viewport.width + "px";
  canvas.style.height = viewport.height + "px";

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  await page.render({ canvasContext: ctx, viewport }).promise;

  rendered.add(p);
}

function trackScroll() {
  viewer.addEventListener('scroll', () => {
    const mid = viewer.scrollTop + viewer.clientHeight / 2;

    for (let i = 1; i <= totalPages; i++) {
      const el = pageRefs[i];
      if (!el) continue;

      if (el.offsetTop <= mid &&
          el.offsetTop + el.offsetHeight >= mid) {
        currentPage = i;
        document.getElementById('page-input').value = i;
        break;
      }
    }
  });
}

function goToPage(p) {
  const el = pageRefs[p];
  if (!el) return;

  viewer.scrollTo({
    top: el.offsetTop - 10,
    behavior: 'smooth'
  });
}

document.getElementById('prev').onclick = () => currentPage > 1 && goToPage(currentPage - 1);
document.getElementById('next').onclick = () => currentPage < totalPages && goToPage(currentPage + 1);

document.getElementById('page-input').onchange = (e) => {
  const p = parseInt(e.target.value);
  if (p >= 1 && p <= totalPages) goToPage(p);
};

function rerender() {
  rendered.clear();
  Object.keys(canvasRefs).forEach(p => renderPage(parseInt(p)));
}

document.getElementById('zoom-in').onclick = () => { scale = Math.min(scale + 0.25, 4); rerender(); };
document.getElementById('zoom-out').onclick = () => { scale = Math.max(scale - 0.25, 0.5); rerender(); };

document.getElementById('fit').onclick = async () => {
  const page = await pdfDoc.getPage(1);
  const vp = page.getViewport({ scale: 1 });
  scale = (viewer.clientWidth - 20) / vp.width;
  rerender();
};

document.getElementById('download').onclick = () => {
  const a = document.createElement('a');
  a.href = fileURL;
  a.download = path?.split('/').pop() || 'document.pdf';
  document.body.appendChild(a);
  a.click();
  a.remove();
};

/* 🔥 FULLSCREEN (FIXED PROPERLY) */
const fsBtn = document.getElementById('fullscreen');
const exitBtn = document.getElementById('exit-fullscreen');

let hideTimeout;

fsBtn.onclick = async () => {
  await document.documentElement.requestFullscreen();
  document.body.classList.add('fullscreen');
  exitBtn.style.display = 'block';
  showExit();
};

exitBtn.onclick = async () => {
  await document.exitFullscreen();
};

function showExit() {
  exitBtn.classList.remove('hidden');
  clearTimeout(hideTimeout);
  hideTimeout = setTimeout(() => {
    exitBtn.classList.add('hidden');
  }, 2000);
}

document.addEventListener('click', () => {
  if (document.fullscreenElement) showExit();
});

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    document.body.classList.remove('fullscreen');
    exitBtn.style.display = 'none';
  }
});

window.onload = init;
</script>

</body>
</html>

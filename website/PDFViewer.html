<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f1f5f9;
}

.header {
  position: sticky;
  top: 0;
  background: white;
  padding: 10px;
  display: flex;
  gap: 8px;
  align-items: center;
  border-bottom: 1px solid #ddd;
  z-index: 1000;
  flex-wrap: wrap;
}

button {
  padding: 6px 10px;
  border: 1px solid #ddd;
  background: white;
  border-radius: 6px;
  cursor: pointer;
}

#pdf-viewer {
  height: calc(100vh - 60px);
  overflow: auto;
  scroll-behavior: smooth;
}

.page {
  margin: 20px auto;
  background: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  border-radius: 8px;
}

canvas {
  display: block;
}

.loading {
  text-align: center;
  padding: 40px;
}

/* Fullscreen exit button */
#exit-fullscreen {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 10px 14px;
  border-radius: 8px;
  display: none;
  z-index: 2000;
  cursor: pointer;
  transition: opacity 0.3s;
}

#exit-fullscreen.hidden {
  opacity: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="header">
  <button id="prev">⬅</button>
  <input id="page-input" type="number" value="1" style="width:60px;">
  <span id="total">/ 0</span>
  <button id="next">➡</button>

  <button id="zoom-in">+</button>
  <button id="zoom-out">-</button>
  <button id="fit">Fit</button>

  <button id="download">Download</button>
  <button id="fullscreen">Fullscreen</button>
</div>

<div id="pdf-viewer">
  <div class="loading" id="loading">Loading PDF...</div>
</div>

<div id="exit-fullscreen">Exit</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const urlParams = new URLSearchParams(window.location.search);
const path = urlParams.get('path');
const fileURL = `/file?path=${encodeURIComponent(path)}`;

let pdfDoc = null;
let totalPages = 0;
let currentPage = 1;
let scale = 1.2;

const viewer = document.getElementById('pdf-viewer');
const loading = document.getElementById('loading');

const pageRefs = {};
const canvasRefs = {};
const rendered = new Set();

// INIT
async function init() {
  try {
    pdfDoc = await pdfjsLib.getDocument(fileURL).promise;
    totalPages = pdfDoc.numPages;

    document.getElementById('total').textContent = `/ ${totalPages}`;

    const page = await pdfDoc.getPage(1);
    const vp = page.getViewport({ scale: 1 });
    scale = (viewer.clientWidth - 40) / vp.width;

    loading.style.display = 'none';

    createPages();
    observePages();
    trackScroll();

  } catch (e) {
    loading.innerHTML = "Error loading PDF: " + e.message;
  }
}

// CREATE PAGES
function createPages() {
  const wrapper = document.createElement('div');

  for (let i = 1; i <= totalPages; i++) {
    const div = document.createElement('div');
    div.className = 'page';
    div.dataset.page = i;

    const canvas = document.createElement('canvas');

    div.appendChild(canvas);
    wrapper.appendChild(div);

    pageRefs[i] = div;
    canvasRefs[i] = canvas;
  }

  viewer.appendChild(wrapper);
}

// LAZY LOAD
function observePages() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const p = parseInt(entry.target.dataset.page);
        renderPage(p);
        if (p > 1) renderPage(p - 1);
        if (p < totalPages) renderPage(p + 1);
      }
    });
  }, { root: viewer, rootMargin: '200px' });

  Object.values(pageRefs).forEach(el => observer.observe(el));
}

// RENDER PAGE (NO FLIP FIXED)
async function renderPage(p) {
  if (rendered.has(p)) return;

  const page = await pdfDoc.getPage(p);

  const viewport = page.getViewport({
    scale: scale,
    rotation: (page.rotate + 360) % 360
  });

  const canvas = canvasRefs[p];
  const ctx = canvas.getContext('2d');

  const dpr = window.devicePixelRatio || 1;

  canvas.width = viewport.width * dpr;
  canvas.height = viewport.height * dpr;
  canvas.style.width = viewport.width + "px";
  canvas.style.height = viewport.height + "px";

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  await page.render({
    canvasContext: ctx,
    viewport
  }).promise;

  rendered.add(p);
}

// SCROLL TRACK
function trackScroll() {
  viewer.addEventListener('scroll', () => {
    const mid = viewer.scrollTop + viewer.clientHeight / 2;

    for (let i = 1; i <= totalPages; i++) {
      const el = pageRefs[i];
      if (!el) continue;

      if (el.offsetTop <= mid &&
          el.offsetTop + el.offsetHeight >= mid) {
        currentPage = i;
        document.getElementById('page-input').value = i;
        break;
      }
    }
  });
}

// NAVIGATION
function goToPage(p) {
  const el = pageRefs[p];
  if (!el) return;

  viewer.scrollTo({
    top: el.offsetTop - 10,
    behavior: 'smooth'
  });
}

document.getElementById('prev').onclick = () => {
  if (currentPage > 1) goToPage(currentPage - 1);
};

document.getElementById('next').onclick = () => {
  if (currentPage < totalPages) goToPage(currentPage + 1);
};

document.getElementById('page-input').onchange = (e) => {
  const p = parseInt(e.target.value);
  if (p >= 1 && p <= totalPages) goToPage(p);
};

// ZOOM
function rerender() {
  rendered.clear();
  Object.keys(canvasRefs).forEach(p => renderPage(parseInt(p)));
}

document.getElementById('zoom-in').onclick = () => {
  scale = Math.min(scale + 0.25, 4);
  rerender();
};

document.getElementById('zoom-out').onclick = () => {
  scale = Math.max(scale - 0.25, 0.5);
  rerender();
};

document.getElementById('fit').onclick = async () => {
  const page = await pdfDoc.getPage(1);
  const vp = page.getViewport({ scale: 1 });

  scale = (viewer.clientWidth - 40) / vp.width;
  rerender();
};

// DOWNLOAD
document.getElementById('download').onclick = () => {
  const link = document.createElement('a');
  link.href = fileURL;
  link.download = path?.split('/').pop() || 'document.pdf';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};

// FULLSCREEN
const fsBtn = document.getElementById('fullscreen');
const exitBtn = document.getElementById('exit-fullscreen');

let hideTimeout;

fsBtn.onclick = () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    exitBtn.style.display = 'block';
    showExit();
  }
};

exitBtn.onclick = () => document.exitFullscreen();

function showExit() {
  exitBtn.classList.remove('hidden');
  clearTimeout(hideTimeout);
  hideTimeout = setTimeout(() => {
    exitBtn.classList.add('hidden');
  }, 2000);
}

document.addEventListener('click', () => {
  if (document.fullscreenElement) showExit();
});

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    exitBtn.style.display = 'none';
  }
});

// INIT
window.onload = init;
</script>

</body>
</html>

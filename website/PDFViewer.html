<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8e8;
    --muted: #555;
    --accent: #c8f45a;
    --accent-dim: rgba(200,244,90,0.12);
    --bar-h: 48px;
    --radius: 8px;
    --trans: 200ms cubic-bezier(.4,0,.2,1);
  }

  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow: hidden; }

  /* ── TOOLBAR ── */
  #bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    height: var(--bar-h);
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 2px; padding: 0 10px;
    transition: transform var(--trans), opacity var(--trans);
  }
  #bar.hidden { transform: translateY(calc(-1 * var(--bar-h))); opacity: 0; pointer-events: none; }

  .sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
  .spacer { flex: 1; }

  .btn {
    height: 34px; min-width: 34px; padding: 0 10px;
    background: transparent; border: 1px solid transparent;
    border-radius: var(--radius); color: var(--muted); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
    transition: all var(--trans); letter-spacing: 0.02em;
  }
  .btn:hover { background: rgba(255,255,255,0.06); color: var(--text); border-color: var(--border); }
  .btn:active { transform: scale(0.96); }
  .btn.accent { background: var(--accent-dim); color: var(--accent); border-color: rgba(200,244,90,0.25); }
  .btn.accent:hover { background: rgba(200,244,90,0.2); }
  .btn svg { flex-shrink: 0; }
  .btn.icon-only { padding: 0; width: 34px; justify-content: center; }

  #page-display {
    font-size: 11px; color: var(--muted); white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  #page-input {
    width: 36px; height: 26px; background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px;
    text-align: center; outline: none;
    transition: border-color var(--trans);
  }
  #page-input:focus { border-color: var(--accent); }

  #zoom-display { font-size: 11px; color: var(--muted); min-width: 38px; text-align: center; }

  #filename {
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--text); max-width: 220px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── HOVER REVEAL ── */
  #hover-zone {
    position: fixed; top: 0; left: 0; right: 0; height: 8px; z-index: 199;
  }

  /* ── CONTENT ── */
  #viewer {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    overflow: auto; display: flex; flex-direction: column;
    align-items: center; background: var(--bg);
    padding: calc(var(--bar-h) + 12px) 0 12px;
    transition: padding var(--trans);
    scroll-behavior: smooth;
  }
  #viewer.fullscreen-mode { padding: 0; }

  /* ── PDF CANVAS ── */
  #pdf-canvas {
    display: block; max-width: 100%;
    box-shadow: 0 8px 60px rgba(0,0,0,0.6);
    border-radius: 3px;
  }

  /* ── EPUB ── */
  #epub-frame {
    width: 100%; max-width: 760px; min-height: calc(100vh - var(--bar-h) - 24px);
    background: #fafaf8; border-radius: 4px;
    box-shadow: 0 8px 60px rgba(0,0,0,0.6);
    padding: 64px 80px; line-height: 1.8;
    color: #1a1a1a; font-family: Georgia, serif; font-size: 18px;
    display: none;
  }
  #epub-frame.visible { display: block; }
  #epub-frame img { max-width: 100%; height: auto; display: block; margin: 24px auto; }
  #epub-frame h1,#epub-frame h2,#epub-frame h3 { font-family: 'Syne', sans-serif; margin: 1.5em 0 0.5em; line-height: 1.3; }
  #epub-frame p { margin-bottom: 1em; }
  #epub-frame a { color: #2563eb; }

  /* ── LOADING / DROP ── */
  #drop-zone {
    position: fixed; inset: 0; z-index: 500;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; background: var(--bg);
    transition: opacity var(--trans);
  }
  #drop-zone.hidden { opacity: 0; pointer-events: none; }
  #drop-zone.drag-over { background: rgba(200,244,90,0.04); }

  .drop-icon {
    width: 80px; height: 80px; border: 2px solid var(--border);
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{ border-color: var(--border); } 50%{ border-color: rgba(200,244,90,0.4); } }

  .drop-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
  .drop-sub { font-size: 12px; color: var(--muted); }

  .drop-btn {
    height: 40px; padding: 0 20px; background: var(--accent-dim);
    border: 1px solid rgba(200,244,90,0.3); border-radius: var(--radius);
    color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px;
    cursor: pointer; transition: all var(--trans);
  }
  .drop-btn:hover { background: rgba(200,244,90,0.2); }

  #file-input { display: none; }

  /* ── SPINNER ── */
  #spinner {
    position: fixed; inset: 0; z-index: 300; display: none;
    align-items: center; justify-content: center; background: var(--bg);
  }
  #spinner.show { display: flex; }
  .spin-ring {
    width: 36px; height: 36px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: rgba(30,30,30,0.95); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 18px; font-size: 12px; color: var(--text);
    opacity: 0; pointer-events: none; transition: all var(--trans); z-index: 400;
    backdrop-filter: blur(12px); white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── FULLSCREEN ── */
  :fullscreen #bar { background: rgba(0,0,0,0.85); }
  :fullscreen #viewer { padding-top: calc(var(--bar-h) + 12px); }
  :fullscreen #viewer.fullscreen-mode { padding: 0; }

  /* ── SCROLLBAR ── */
  #viewer::-webkit-scrollbar { width: 6px; }
  #viewer::-webkit-scrollbar-track { background: transparent; }
  #viewer::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  #viewer::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* ── EPUB NAV (prev/next chapter) ── */
  .epub-nav {
    position: fixed; top: 50%; z-index: 150; transform: translateY(-50%);
    width: 36px; height: 80px; display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; transition: all var(--trans);
    display: none;
  }
  .epub-nav:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .epub-nav.left { left: 0; border-left: none; border-radius: 0 var(--radius) var(--radius) 0; }
  .epub-nav.right { right: 0; border-right: none; border-radius: var(--radius) 0 0 var(--radius); }
  .epub-nav.active { display: flex; }

  @media (max-width: 600px) {
    #filename { display: none; }
    .sep { display: none; }
    #bar { padding: 0 6px; gap: 1px; }
    .btn { height: 30px; min-width: 30px; padding: 0 7px; font-size: 10px; }
    .btn.icon-only { width: 30px; }
    #epub-frame { padding: 24px 20px; font-size: 16px; }
  }
</style>
</head>
<body>

<!-- Drop Zone / Landing -->
<div id="drop-zone">
  <div class="drop-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#c8f45a" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" y1="18" x2="12" y2="12"/>
      <line x1="9" y1="15" x2="15" y2="15"/>
    </svg>
  </div>
  <div class="drop-title">Drop a file to open</div>
  <div class="drop-sub">Supports PDF and EPUB formats</div>
  <button class="drop-btn" onclick="document.getElementById('file-input').click()">Browse Files</button>
  <input type="file" id="file-input" accept=".pdf,.epub">
</div>

<!-- Spinner -->
<div id="spinner"><div class="spin-ring"></div></div>

<!-- Hover zone to reveal bar -->
<div id="hover-zone"></div>

<!-- Toolbar -->
<div id="bar">
  <span id="filename">—</span>
  <div class="sep"></div>

  <!-- Page nav -->
  <button class="btn icon-only" id="btn-prev" title="Previous (←)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
  </button>
  <div id="page-display">
    <input type="number" id="page-input" min="1" value="1">
    <span>/ <span id="total-pages">—</span></span>
  </div>
  <button class="btn icon-only" id="btn-next" title="Next (→)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>
  </button>

  <div class="sep"></div>

  <!-- Zoom -->
  <button class="btn icon-only" id="btn-zoom-out" title="Zoom Out (-)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <span id="zoom-display">100%</span>
  <button class="btn icon-only" id="btn-zoom-in" title="Zoom In (+)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <button class="btn" id="btn-fit" title="Fit Width (0)">Fit</button>

  <div class="spacer"></div>

  <!-- Actions -->
  <button class="btn" id="btn-open" title="Open File">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Open
  </button>
  <button class="btn" id="btn-download" title="Download">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Save
  </button>

  <div class="sep"></div>

  <button class="btn icon-only" id="btn-fullscreen" title="Fullscreen (F)">
    <svg id="fs-icon-enter" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    <svg id="fs-icon-exit" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
  </button>
</div>

<!-- Main Viewer -->
<div id="viewer">
  <canvas id="pdf-canvas" style="display:none"></canvas>
  <div id="epub-frame"></div>
</div>

<!-- EPUB nav buttons -->
<button class="epub-nav left" id="epub-prev">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
</button>
<button class="epub-nav right" id="epub-next">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>
</button>

<!-- Toast -->
<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ──
const state = {
  mode: null, // 'pdf' | 'epub'
  pdfDoc: null,
  currentPage: 1,
  totalPages: 0,
  scale: 1.0,
  fileData: null,
  fileName: '',
  epub: { spine: [], current: 0, zip: null, opfDir: '' },
  barHidden: false,
  autoHideTimer: null,
  rendering: false,
};

// ── DOM ──
const $ = id => document.getElementById(id);
const bar = $('bar');
const viewer = $('viewer');
const canvas = $('pdf-canvas');
const ctx = canvas.getContext('2d');
const epubFrame = $('epub-frame');
const dropZone = $('drop-zone');
const spinner = $('spinner');
const toast = $('toast');

// ── TOOLBAR AUTO-HIDE ──
let mouseOnBar = false;
bar.addEventListener('mouseenter', () => { mouseOnBar = true; showBar(); });
bar.addEventListener('mouseleave', () => { mouseOnBar = false; scheduleHide(); });
$('hover-zone').addEventListener('mouseenter', () => showBar());
viewer.addEventListener('mousemove', () => { showBar(); scheduleHide(); });

function showBar() {
  bar.classList.remove('hidden');
  state.barHidden = false;
  clearTimeout(state.autoHideTimer);
}
function hideBar() {
  if (!mouseOnBar) {
    bar.classList.add('hidden');
    state.barHidden = true;
  }
}
function scheduleHide() {
  clearTimeout(state.autoHideTimer);
  state.autoHideTimer = setTimeout(hideBar, 2800);
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ── FILE OPEN ──
$('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadFile(file);
  e.target.value = '';
});
$('btn-open').addEventListener('click', () => $('file-input').click());

// Drag & drop
document.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) dropZone.classList.remove('drag-over'); });
document.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

// URL param support
(function() {
  const params = new URLSearchParams(location.search);
  const path = params.get('path');
  if (path) {
    const url = `/file?path=${encodeURIComponent(path)}`;
    const ext = path.split('.').pop().toLowerCase();
    spinner.classList.add('show');
    fetch(url).then(r => r.blob()).then(blob => {
      const file = new File([blob], path.split('/').pop(), { type: blob.type });
      loadFile(file);
    }).catch(() => { spinner.classList.remove('show'); showToast('Failed to load file from URL'); });
  }
})();

async function loadFile(file) {
  state.fileName = file.name;
  $('filename').textContent = file.name;
  const ext = file.name.split('.').pop().toLowerCase();
  spinner.classList.add('show');
  const ab = await file.arrayBuffer();
  state.fileData = ab;
  dropZone.classList.add('hidden');
  if (ext === 'pdf') await loadPDF(ab);
  else if (ext === 'epub') await loadEPUB(ab);
  else { showToast('Unsupported format. Use PDF or EPUB.'); spinner.classList.remove('show'); dropZone.classList.remove('hidden'); }
}

// ── PDF ──
async function loadPDF(ab) {
  try {
    state.mode = 'pdf';
    state.pdfDoc = await pdfjsLib.getDocument({ data: ab.slice(0) }).promise;
    state.totalPages = state.pdfDoc.numPages;
    state.currentPage = 1;
    $('total-pages').textContent = state.totalPages;
    $('page-input').max = state.totalPages;
    canvas.style.display = 'block';
    epubFrame.classList.remove('visible');
    toggleEpubNav(false);
    await autoFitScale();
    await renderPDF(1);
    spinner.classList.remove('show');
    scheduleHide();
  } catch(e) { spinner.classList.remove('show'); showToast('Failed to load PDF: ' + e.message); }
}

async function autoFitScale() {
  const page = await state.pdfDoc.getPage(1);
  const vp = page.getViewport({ scale: 1 });
  const availW = viewer.clientWidth - 24;
  const availH = viewer.clientHeight - 24;
  const scaleW = availW / vp.width;
  const scaleH = availH / vp.height;
  state.scale = Math.min(scaleW, scaleH, 2.0);
  updateZoomDisplay();
}

async function renderPDF(pageNum) {
  if (state.rendering) return;
  state.rendering = true;
  try {
    const page = await state.pdfDoc.getPage(pageNum);
    const dpr = window.devicePixelRatio || 1;
    const vp = page.getViewport({ scale: state.scale * dpr });
    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.width = (vp.width / dpr) + 'px';
    canvas.style.height = (vp.height / dpr) + 'px';
    await page.render({ canvasContext: ctx, viewport: vp }).promise;
    state.currentPage = pageNum;
    $('page-input').value = pageNum;
    $('btn-prev').disabled = pageNum <= 1;
    $('btn-next').disabled = pageNum >= state.totalPages;
    viewer.scrollTo({ top: 0, behavior: 'instant' });
  } finally { state.rendering = false; }
}

// ── EPUB ──
async function loadEPUB(ab) {
  try {
    state.mode = 'epub';
    const zip = await JSZip.loadAsync(ab);
    state.epub.zip = zip;

    // Parse container.xml
    const containerXml = await zip.file('META-INF/container.xml').async('string');
    const parser = new DOMParser();
    const containerDoc = parser.parseFromString(containerXml, 'text/xml');
    const opfPath = containerDoc.querySelector('rootfile').getAttribute('full-path');
    state.epub.opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/') + 1) : '';

    // Parse OPF
    const opfXml = await zip.file(opfPath).async('string');
    const opfDoc = parser.parseFromString(opfXml, 'text/xml');

    // Build id->href map
    const manifest = {};
    opfDoc.querySelectorAll('manifest item').forEach(item => {
      manifest[item.getAttribute('id')] = item.getAttribute('href');
    });

    // Build spine
    state.epub.spine = [];
    opfDoc.querySelectorAll('spine itemref').forEach(ref => {
      const id = ref.getAttribute('idref');
      if (manifest[id]) state.epub.spine.push(state.epub.opfDir + manifest[id]);
    });

    state.totalPages = state.epub.spine.length;
    $('total-pages').textContent = state.totalPages;
    $('page-input').max = state.totalPages;
    canvas.style.display = 'none';
    epubFrame.classList.add('visible');
    toggleEpubNav(true);
    await renderEPUB(0);
    spinner.classList.remove('show');
    scheduleHide();
  } catch(e) { spinner.classList.remove('show'); showToast('Failed to load EPUB: ' + e.message); console.error(e); }
}

async function renderEPUB(idx) {
  if (idx < 0 || idx >= state.epub.spine.length) return;
  spinner.classList.add('show');
  try {
    const path = state.epub.spine[idx];
    const file = state.epub.zip.file(path) || state.epub.zip.file(decodeURIComponent(path));
    if (!file) { showToast('Chapter not found'); spinner.classList.remove('show'); return; }
    let html = await file.async('string');

    // Inline images as base64
    const imgMatches = [...html.matchAll(/src=["']([^"']+)["']/g)];
    for (const m of imgMatches) {
      const imgSrc = m[1];
      if (imgSrc.startsWith('data:') || imgSrc.startsWith('http')) continue;
      const dir = path.includes('/') ? path.substring(0, path.lastIndexOf('/') + 1) : '';
      const imgPath = dir + imgSrc;
      const imgFile = state.epub.zip.file(imgPath) || state.epub.zip.file(decodeURIComponent(imgPath));
      if (imgFile) {
        const b64 = await imgFile.async('base64');
        const mt = imgPath.endsWith('.png') ? 'image/png' : imgPath.endsWith('.gif') ? 'image/gif' : 'image/jpeg';
        html = html.replace(m[0], `src="data:${mt};base64,${b64}"`);
      }
    }

    // Extract body content
    const doc = parser.parseFromString(html, 'text/html');
    const body = doc.body ? doc.body.innerHTML : html;
    epubFrame.innerHTML = body;
    state.epub.current = idx;
    state.currentPage = idx + 1;
    $('page-input').value = state.currentPage;
    $('btn-prev').disabled = idx <= 0;
    $('btn-next').disabled = idx >= state.epub.spine.length - 1;
    $('epub-prev').classList.toggle('active', idx > 0);
    $('epub-next').classList.toggle('active', idx < state.epub.spine.length - 1);
    viewer.scrollTo({ top: 0, behavior: 'instant' });
  } finally { spinner.classList.remove('show'); }
}

function toggleEpubNav(show) {
  $('epub-prev').classList.toggle('active', false);
  $('epub-next').classList.toggle('active', false);
  if (!show) {
    $('epub-prev').style.display = 'none';
    $('epub-next').style.display = 'none';
  } else {
    $('epub-prev').style.display = '';
    $('epub-next').style.display = '';
  }
}

// ── CONTROLS ──
$('btn-prev').addEventListener('click', () => navigate(-1));
$('btn-next').addEventListener('click', () => navigate(1));
$('epub-prev').addEventListener('click', () => navigate(-1));
$('epub-next').addEventListener('click', () => navigate(1));

function navigate(dir) {
  if (state.mode === 'pdf') {
    const np = state.currentPage + dir;
    if (np >= 1 && np <= state.totalPages) renderPDF(np);
  } else if (state.mode === 'epub') {
    const ni = state.epub.current + dir;
    if (ni >= 0 && ni < state.epub.spine.length) renderEPUB(ni);
  }
}

$('page-input').addEventListener('change', () => {
  const v = parseInt($('page-input').value);
  if (!isNaN(v) && v >= 1 && v <= state.totalPages) {
    if (state.mode === 'pdf') renderPDF(v);
    else renderEPUB(v - 1);
  } else $('page-input').value = state.currentPage;
});

// Zoom
$('btn-zoom-in').addEventListener('click', () => zoom(1.2));
$('btn-zoom-out').addEventListener('click', () => zoom(1/1.2));
$('btn-fit').addEventListener('click', fitWidth);

function zoom(factor) {
  if (state.mode !== 'pdf') return;
  state.scale = Math.min(Math.max(state.scale * factor, 0.2), 5);
  updateZoomDisplay();
  renderPDF(state.currentPage);
}
function updateZoomDisplay() {
  $('zoom-display').textContent = Math.round(state.scale * 100) + '%';
}
async function fitWidth() {
  if (state.mode !== 'pdf' || !state.pdfDoc) return;
  const page = await state.pdfDoc.getPage(state.currentPage);
  const vp = page.getViewport({ scale: 1 });
  state.scale = (viewer.clientWidth - 24) / vp.width;
  updateZoomDisplay();
  renderPDF(state.currentPage);
}

// Download
$('btn-download').addEventListener('click', () => {
  if (!state.fileData) return;
  const blob = new Blob([state.fileData]);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = state.fileName || 'document';
  a.click(); URL.revokeObjectURL(url);
  showToast('Downloading…');
});

// Fullscreen
$('btn-fullscreen').addEventListener('click', toggleFullscreen);
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}
document.addEventListener('fullscreenchange', () => {
  const fs = !!document.fullscreenElement;
  $('fs-icon-enter').style.display = fs ? 'none' : '';
  $('fs-icon-exit').style.display = fs ? '' : 'none';
  $('btn-fullscreen').classList.toggle('accent', fs);
});

// Wheel zoom
viewer.addEventListener('wheel', e => {
  if ((e.ctrlKey || e.metaKey) && state.mode === 'pdf') {
    e.preventDefault();
    zoom(e.deltaY < 0 ? 1.1 : 1/1.1);
  }
}, { passive: false });

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case 'ArrowRight': case 'ArrowDown': case 'PageDown': e.preventDefault(); navigate(1); break;
    case 'ArrowLeft': case 'ArrowUp': case 'PageUp': e.preventDefault(); navigate(-1); break;
    case 'Home': e.preventDefault(); if(state.mode==='pdf') renderPDF(1); else renderEPUB(0); break;
    case 'End': e.preventDefault(); if(state.mode==='pdf') renderPDF(state.totalPages); else renderEPUB(state.epub.spine.length-1); break;
    case '+': case '=': e.preventDefault(); zoom(1.2); break;
    case '-': e.preventDefault(); zoom(1/1.2); break;
    case '0': e.preventDefault(); fitWidth(); break;
    case 'f': case 'F': toggleFullscreen(); break;
    case 'h': case 'H': bar.classList.toggle('hidden'); break;
  }
});

// Touch swipe
let touchStartX = 0, touchStartY = 0;
viewer.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
viewer.addEventListener('touchend', e => {
  const dx = touchStartX - e.changedTouches[0].clientX;
  const dy = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) navigate(dx > 0 ? 1 : -1);
}, { passive: true });

// Resize re-render
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if(state.mode==='pdf') renderPDF(state.currentPage); }, 200);
});
</script>
</body>
</html>
